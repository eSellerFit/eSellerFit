<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Free 30-Min Call — eSellerFit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #faf8f3;
    }
    h1 { font-size: 28px; margin-bottom: 10px; color: #0f6e56; }
    .subtitle { font-size: 14px; color: #7a7065; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #0f6e56; }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d8d0c4;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
    }
    input[type="text"]:focus, input[type="email"]:focus {
      outline: none;
      border-color: #0f6e56;
      box-shadow: 0 0 0 2px rgba(15, 110, 86, 0.1);
    }
    .consent-section { background: #fff; padding: 20px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #d8d0c4; }
    .consent-item { margin-bottom: 15px; }
    .consent-item label { margin: 0; font-weight: 400; display: flex; align-items: flex-start; cursor: pointer; }
    .consent-item input[type="checkbox"] { margin-right: 10px; margin-top: 3px; cursor: pointer; }
    .consent-item a { color: #0f6e56; text-decoration: underline; }
    button {
      width: 100%;
      padding: 12px;
      background: #0f6e56;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #0a4d3f; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #d32f2f; font-size: 13px; margin-top: 4px; }
    .success { background: #e8f5e9; border: 1px solid #4caf50; color: #2e7d32; padding: 12px; border-radius: 4px; margin-bottom: 20px; }
  </style>
</head>
<body>

<h1>Book Your Free Call</h1>
<p class="subtitle">30 minutes with Gio to discuss your marketplace strategy</p>

<form id="bookingForm">
  <div class="form-group">
    <label for="fullName">Full Name *</label>
    <input type="text" id="fullName" name="fullName" required>
    <div class="error" id="fullNameError"></div>
  </div>

  <div class="form-group">
    <label for="email">Email Address *</label>
    <input type="email" id="email" name="email" required>
    <div class="error" id="emailError"></div>
  </div>

  <div class="consent-section">
    <p style="margin-bottom: 15px; font-weight: 600;">Required Agreements</p>
    
    <div class="consent-item">
      <label for="termsConsent">
        <input type="checkbox" id="termsConsent" name="termsConsent">
        I agree to the <a href="/legal/terms.html" target="_blank">Terms of Service</a>
      </label>
    </div>

    <div class="consent-item">
      <label for="privacyConsent">
        <input type="checkbox" id="privacyConsent" name="privacyConsent">
        I agree to the <a href="/legal/privacy.html" target="_blank">Privacy Policy</a>
      </label>
    </div>

    <div class="consent-item">
      <label for="disclaimerConsent">
        <input type="checkbox" id="disclaimerConsent" name="disclaimerConsent">
        I acknowledge the <a href="/legal/disclaimer.html" target="_blank">Disclaimer</a>
      </label>
    </div>

    <div class="consent-item">
      <label for="noSalesPitch">
        <input type="checkbox" id="noSalesPitch" name="noSalesPitch">
        I understand this is a free consultation with no sales pitch
      </label>
    </div>
  </div>

  <button type="submit" id="submitBtn" disabled>Continue to Calendar</button>
</form>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzym1dpMmCezcBk4cIBE_9HaSw2w4iIva5okt1gxTkv0WVMhCz68BarR7iKDTuth7z/exec;

// Get client IP and browser info
async function getClientInfo() {
  const userAgent = navigator.userAgent;
  const platform = navigator.platform;
  
  let ip = 'unknown';
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    ip = data.ip;
  } catch (e) {
    console.log('Could not fetch IP');
  }
  
  return {
    ip,
    userAgent,
    platform,
    timestamp: new Date().toISOString()
  };
}

// Check if all required consents are checked
function validateForm() {
  const fullName = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const termsConsent = document.getElementById('termsConsent').checked;
  const privacyConsent = document.getElementById('privacyConsent').checked;
  const disclaimerConsent = document.getElementById('disclaimerConsent').checked;
  const noSalesPitch = document.getElementById('noSalesPitch').checked;

  const isValid = fullName && email && termsConsent && privacyConsent && disclaimerConsent && noSalesPitch;
  document.getElementById('submitBtn').disabled = !isValid;
}

// Validate on input
document.getElementById('fullName').addEventListener('input', validateForm);
document.getElementById('email').addEventListener('input', validateForm);
document.getElementById('termsConsent').addEventListener('change', validateForm);
document.getElementById('privacyConsent').addEventListener('change', validateForm);
document.getElementById('disclaimerConsent').addEventListener('change', validateForm);
document.getElementById('noSalesPitch').addEventListener('change', validateForm);

// Handle form submission
document.getElementById('bookingForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const clientInfo = await getClientInfo();
  const now = new Date().toISOString();

  // Send to Google Sheet via Apps Script
  try {
    const payload = {
      source: 'free-call',
      fullName: document.getElementById('fullName').value.trim(),
      email: document.getElementById('email').value.trim(),
      consents: {
        terms: document.getElementById('termsConsent').checked,
        privacy: document.getElementById('privacyConsent').checked,
        disclaimer: document.getElementById('disclaimerConsent').checked,
        noSalesPitch: document.getElementById('noSalesPitch').checked
      },
      tracking: {
        ip: clientInfo.ip,
        userAgent: clientInfo.userAgent,
        platform: clientInfo.platform,
        deviceType: /mobile|android|iphone|ipad|tablet/i.test(clientInfo.userAgent) ? 'mobile' : 'desktop'
      }
    };

    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: {
        'Content-Type': 'application/json'
      }
    });

    const result = await response.json();
    console.log('Apps Script response:', result);
  } catch (error) {
    console.error('Error sending to Apps Script:', error);
  }

  // Save to localStorage (for your records)
  const consentData = {
    fullName: document.getElementById('fullName').value.trim(),
    email: document.getElementById('email').value.trim(),
    service: 'Free Call',
    termsAgreed: document.getElementById('termsConsent').checked,
    privacyAgreed: document.getElementById('privacyConsent').checked,
    disclaimerAgreed: document.getElementById('disclaimerConsent').checked,
    noSalesPitchAgreed: document.getElementById('noSalesPitch').checked,
    consentTimestamp: now,
    allConsentsObtained: true
  };

  localStorage.setItem('esellerfit_free_call_consent', JSON.stringify(consentData));

  // Redirect to Google Calendar
  setTimeout(() => {
    window.location.href = 'https://calendar.app.google/x1dHuHqqeXsrnJwaA';
  }, 500);
});
</script>

</body>
</html>
